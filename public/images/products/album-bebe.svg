  <line x1="320" y1="532" x2="480" y2="532" stroke="#C890A8" stroke-width="1.5"/>

  <text x="400" y="580" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#9A7080" text-anchor="middle" letter-spacing="6">ÁLBUMES</text>

  <text x="400" y="730" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#C4A882" text-anchor="middle" font-style="italic">Irida Studio</text>
