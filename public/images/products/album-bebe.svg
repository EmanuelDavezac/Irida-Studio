  <!-- small star -->
  <text x="255" y="195" font-size="24" text-anchor="middle" fill="#D8A0C0" opacity="0.5" font-family="serif">✦</text>

  <text x="400" y="420" font-family="Georgia,'Times New Roman',serif" font-size="52" fill="#1A1A18" text-anchor="middle" font-style="italic">Álbum de</text>
