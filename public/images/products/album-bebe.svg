  <!-- photo placeholders inside album -->
  <rect x="316" y="168" width="90" height="70" fill="#F0D8E4" rx="4" opacity="0.7"/>
  <rect x="416" y="168" width="90" height="70" fill="#EDD0DC" rx="4" opacity="0.7"/>
