<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#F5E8EE"/>
  <rect x="36" y="36" width="728" height="728" fill="none" stroke="#E0C0D0" stroke-width="1.5"/>
  <circle cx="56" cy="56" r="3.5" fill="#C890A8"/>
  <circle cx="744" cy="56" r="3.5" fill="#C890A8"/>
  <circle cx="56" cy="744" r="3.5" fill="#C890A8"/>
  <circle cx="744" cy="744" r="3.5" fill="#C890A8"/>

  <!-- album / book shape -->
  <rect x="275" y="148" width="250" height="200" fill="white" rx="8" opacity="0.85"/>
