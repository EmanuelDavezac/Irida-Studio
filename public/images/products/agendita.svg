<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#E8F0E8"/>
  <rect x="36" y="36" width="728" height="728" fill="none" stroke="#C4D8C4" stroke-width="1.5"/>
  <circle cx="56" cy="56" r="3.5" fill="#90B090"/>
  <circle cx="744" cy="56" r="3.5" fill="#90B090"/>
  <circle cx="56" cy="744" r="3.5" fill="#90B090"/>
  <circle cx="744" cy="744" r="3.5" fill="#90B090"/>

  <!-- notebook / book shape -->
  <rect x="310" y="150" width="180" height="220" fill="white" rx="6" opacity="0.8" filter="drop-shadow(0 2px 8px rgba(0,0,0,0.06))"/>
  <!-- spine -->
  <rect x="310" y="150" width="18" height="220" fill="#B0C8B0" rx="6" opacity="0.7"/>
  <!-- lines on notebook -->
  <line x1="342" y1="200" x2="478" y2="200" stroke="#D8E8D8" stroke-width="2"/>
  <line x1="342" y1="225" x2="478" y2="225" stroke="#D8E8D8" stroke-width="2"/>
  <line x1="342" y1="250" x2="478" y2="250" stroke="#D8E8D8" stroke-width="2"/>
  <line x1="342" y1="275" x2="478" y2="275" stroke="#D8E8D8" stroke-width="2"/>
  <!-- small ribbon bookmark -->
  <rect x="460" y="148" width="12" height="50" fill="#C8A882" rx="2" opacity="0.8"/>

  <text x="400" y="435" font-family="Georgia,'Times New Roman',serif" font-size="60" fill="#1A1A18" text-anchor="middle" font-style="italic">Agendita</text>
  <text x="400" y="505" font-family="Georgia,'Times New Roman',serif" font-size="48" fill="#1A1A18" text-anchor="middle" font-style="italic">by Irida</text>

  <line x1="330" y1="548" x2="470" y2="548" stroke="#90B090" stroke-width="1.5"/>

  <text x="400" y="596" font-family="Arial,Helvetica,sans-serif" font-size="15" fill="#708070" text-anchor="middle" letter-spacing="6">AGENDITAS</text>

  <text x="400" y="730" font-family="Georgia,'Times New Roman',serif" font-size="22" fill="#C4A882" text-anchor="middle" font-style="italic">Irida Studio</text>
</svg>
